<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OralScan AI — Clinical Decision Support</title>
<template id="__bundler_thumbnail" data-bg-color="#1e2330">
  <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
    <rect width="120" height="80" fill="#1e2330"/>
    <rect x="0" y="0" width="28" height="80" fill="#1a1f2e"/>
    <rect x="6" y="18" width="16" height="3" rx="1.5" fill="#22d3c8" opacity="0.9"/>
    <rect x="6" y="26" width="14" height="2" rx="1" fill="#4a5568" opacity="0.6"/>
    <rect x="32" y="8" width="52" height="30" rx="4" fill="#252b3b" stroke="#2d3548" stroke-width="0.5"/>
    <rect x="36" y="56" width="44" height="8" rx="3" fill="#22d3c8" opacity="0.9"/>
  </svg>
</template>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       oklch(0.14 0.015 250);
    --panel:    oklch(0.18 0.012 248);
    --card:     oklch(0.21 0.01 248);
    --card2:    oklch(0.23 0.01 248);
    --border:   oklch(0.28 0.012 248);
    --teal:     oklch(0.70 0.14 192);
    --teal-dim: oklch(0.70 0.14 192 / 0.12);
    --teal-glow:oklch(0.70 0.14 192 / 0.35);
    --coral:    oklch(0.68 0.14 28);
    --success:  oklch(0.68 0.14 155);
    --error:    oklch(0.65 0.18 22);
    --warn:     oklch(0.75 0.14 60);
    --text-primary:   oklch(0.96 0.005 248);
    --text-secondary: oklch(0.62 0.01 248);
    --text-muted:     oklch(0.42 0.01 248);
  }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); overflow: hidden; }
  #root { height: 100%; display: flex; }

  /* ── Layout ── */
  .app { display: flex; height: 100vh; width: 100%; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  .sidebar-logo {
    padding: 22px 20px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--teal);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Sora', sans-serif; font-weight: 700; font-size: 12px;
    color: var(--bg); letter-spacing: -0.5px; flex-shrink: 0;
  }
  .logo-name { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: -0.3px; }
  .logo-sub  { font-size: 9px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 1px; }

  .sidebar-nav { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 2px; }
  .nav-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); padding: 8px 10px 4px; font-weight: 500; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 400; color: var(--text-secondary);
    transition: all 0.15s; border: 1px solid transparent;
    text-decoration: none;
  }
  .nav-item:hover { background: var(--card); color: var(--text-primary); }
  .nav-item.active {
    background: var(--teal-dim); color: var(--teal);
    border-color: oklch(0.70 0.14 192 / 0.2);
    font-weight: 500;
  }
  .nav-item svg { flex-shrink: 0; opacity: 0.8; }
  .nav-item.active svg { opacity: 1; }

  .sidebar-footer {
    padding: 12px 10px 16px;
    border-top: 1px solid var(--border);
  }

  /* ── Main area ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    padding: 18px 28px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }
  .topbar-title { font-family: 'Sora', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
  .topbar-sub   { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  .content { flex: 1; display: flex; overflow: hidden; }

  /* ── Left form column ── */
  .form-col {
    width: 480px; flex-shrink: 0;
    padding: 24px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 16px;
  }
  .form-col::-webkit-scrollbar { width: 4px; }
  .form-col::-webkit-scrollbar-track { background: transparent; }
  .form-col::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .card-header {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 13px; font-weight: 500; color: var(--text-primary);
  }
  .card-header svg { color: var(--teal); }
  .card-body { padding: 18px; display: flex; flex-direction: column; gap: 14px; }

  /* ── Upload zone ── */
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    padding: 24px 16px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer; transition: all 0.2s;
    background: oklch(0.19 0.01 248);
    position: relative; overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--teal); background: var(--teal-dim); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { color: var(--teal); opacity: 0.7; }
  .upload-title { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
  .upload-hint  { font-size: 11px; color: var(--text-muted); text-align: center; line-height: 1.5; }
  .upload-file  { font-size: 11px; color: var(--teal); font-weight: 500; margin-top: 4px; display: flex; align-items: center; gap: 5px; }
  .upload-preview {
    width: 100%; border-radius: 8px; overflow: hidden;
    border: 1px solid var(--border); margin-top: 4px;
  }
  .upload-preview img { width: 100%; height: 120px; object-fit: cover; display: block; }

  /* ── Field ── */
  .field-row { display: flex; gap: 12px; }
  .field-group { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .field-label { font-size: 11px; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.3px; text-transform: uppercase; }
  .field-input, .field-select, .field-textarea {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
    -webkit-appearance: none;
  }
  .field-input::placeholder, .field-textarea::placeholder { color: var(--text-muted); }
  .field-input:focus, .field-select:focus, .field-textarea:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px var(--teal-dim);
  }
  .field-select { cursor: pointer; }
  .field-select option { background: var(--card2); }
  .field-textarea { resize: vertical; min-height: 90px; font-family: 'DM Mono', monospace, 'DM Sans', sans-serif; font-size: 12px; line-height: 1.6; }

  /* ── Error banner ── */
  .error-banner {
    display: flex; align-items: center; gap: 8px;
    background: oklch(0.65 0.18 22 / 0.12);
    border: 1px solid oklch(0.65 0.18 22 / 0.35);
    border-radius: 8px; padding: 10px 14px;
    font-size: 12px; color: var(--error);
    animation: fadeIn 0.3s ease;
  }

  /* ── Run button ── */
  .run-btn {
    width: 100%; padding: 13px;
    background: var(--teal); color: var(--bg);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    border: none; border-radius: 10px; cursor: pointer; letter-spacing: 0.3px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.2s; position: relative; overflow: hidden;
  }
  .run-btn:hover { background: oklch(0.74 0.14 192); transform: translateY(-1px); box-shadow: 0 8px 20px var(--teal-glow); }
  .run-btn:active { transform: translateY(0); }
  .run-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
  .run-btn.loading::after {
    content:''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, oklch(1 0 0 / 0.15), transparent);
    animation: shimmer 1.2s infinite;
  }
  @keyframes shimmer { from{transform:translateX(-100%)} to{transform:translateX(100%)} }

  /* ── Results panel ── */
  .results-col {
    flex: 1;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .results-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .results-title { font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .results-badge {
    font-size: 10px; padding: 3px 9px; border-radius: 20px;
    font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .badge-waiting { background: var(--teal-dim); color: var(--teal); border: 1px solid oklch(0.70 0.14 192 / 0.2); }
  .badge-running { background: oklch(0.75 0.14 60 / 0.15); color: var(--warn); border: 1px solid oklch(0.75 0.14 60 / 0.3); }
  .badge-done    { background: oklch(0.68 0.14 155 / 0.12); color: var(--success); border: 1px solid oklch(0.68 0.14 155 / 0.3); }

  .results-body { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .results-body::-webkit-scrollbar { width: 4px; }
  .results-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Waiting state */
  .waiting-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    padding: 60px 40px; text-align: center;
  }
  .pulse-ring {
    width: 64px; height: 64px; border-radius: 50%;
    border: 2px solid var(--teal-dim);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .pulse-ring::before {
    content: ''; position: absolute; inset: -8px;
    border-radius: 50%; border: 1px solid var(--teal-dim);
    animation: ripple 2s ease-out infinite;
  }
  .pulse-ring::after {
    content: ''; position: absolute; inset: -16px;
    border-radius: 50%; border: 1px solid oklch(0.70 0.14 192 / 0.06);
    animation: ripple 2s ease-out 0.5s infinite;
  }
  @keyframes ripple { 0%{transform:scale(0.8);opacity:1} 100%{transform:scale(1.4);opacity:0} }
  .waiting-title { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 600; color: var(--text-secondary); }
  .waiting-sub   { font-size: 12px; color: var(--text-muted); line-height: 1.6; max-width: 280px; }

  /* Running state */
  .running-state { display: flex; flex-direction: column; gap: 16px; }
  .analysis-step {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    animation: fadeIn 0.4s ease both;
  }
  .step-icon {
    width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .step-icon.pending  { background: var(--card2); color: var(--text-muted); }
  .step-icon.active   { background: oklch(0.75 0.14 60 / 0.15); color: var(--warn); }
  .step-icon.complete { background: oklch(0.68 0.14 155 / 0.12); color: var(--success); }
  .step-name  { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .step-sub   { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .step-spinner { width: 14px; height: 14px; border: 2px solid oklch(0.75 0.14 60 / 0.3); border-top-color: var(--warn); border-radius: 50%; animation: spin 0.7s linear infinite; margin-left: auto; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* Result cards */
  .result-section { display: flex; flex-direction: column; gap: 12px; animation: fadeIn 0.5s ease; }
  .result-headline {
    font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 700;
    letter-spacing: -0.3px;
  }
  .result-headline.low    { color: var(--success); }
  .result-headline.medium { color: var(--warn); }
  .result-headline.high   { color: var(--error); }

  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .metric-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px;
  }
  .metric-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 6px; }
  .metric-val   { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .metric-sub   { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  .bar-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .bar-fill  { height: 100%; border-radius: 3px; transition: width 1s ease; }

  .finding-list { display: flex; flex-direction: column; gap: 6px; }
  .finding-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    font-size: 12px; color: var(--text-secondary); line-height: 1.5;
  }
  .finding-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }

  .recommendation {
    background: var(--teal-dim); border: 1px solid oklch(0.70 0.14 192 / 0.2);
    border-radius: 10px; padding: 14px 16px;
    font-size: 12px; color: var(--text-secondary); line-height: 1.6;
  }
  .recommendation strong { color: var(--teal); }

  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── SVG Icons ── */
const Ic = ({ d, size=16, sw=1.7 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
    {(Array.isArray(d) ? d : [d]).map((p,i) => <path key={i} d={p} />)}
  </svg>
);
const IcHub      = () => <Ic size={15} d={["M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z","M9 22V12h6v10"]} />;
const IcRecords  = () => <Ic size={15} d={["M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z","M14 2v6h6","M16 13H8","M16 17H8","M10 9H8"]} />;
const IcLogout   = () => <Ic size={15} d={["M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4","M16 17l5-5-5-5","M21 12H9"]} />;
const IcUpload   = () => <Ic size={22} d={["M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4","M17 8l-5-5-5 5","M12 3v12"]} />;
const IcFile     = () => <Ic size={14} d={["M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z","M13 2v7h7"]} />;
const IcData     = () => <Ic size={13} d={["M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z","M14 2v6h6"]} />;
const IcPlay     = () => <Ic size={16} d="M5 3l14 9-14 9V3z" />;
const IcCheck    = () => <Ic size={14} sw={2.5} d="M20 6L9 17l-5-5" />;
const IcAlert    = () => <Ic size={14} d={["M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z","M12 9v4","M12 17h.01"]} />;
const IcActivity = () => <Ic size={24} d="M22 12h-4l-3 9L9 3l-3 9H2" />;
const IcDna      = () => <Ic size={13} d={["M2 15c6.667-6 13.333 0 20-6","M2 9c6.667 6 13.333 0 20 6"]} />;
const IcEye      = () => <Ic size={13} d={["M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z","M12 9a3 3 0 100 6 3 3 0 000-6z"]} />;
const IcSettings = () => <Ic size={15} d={["M12 2a10 10 0 100 20A10 10 0 0012 2z","M12 8v4","M12 16h.01"]} />;

/* ── Typing animation for JSON ── */
function useTyping(text, active) {
  const [displayed, setDisplayed] = useState('');
  useEffect(() => {
    if (!active) { setDisplayed(''); return; }
    let i = 0;
    const t = setInterval(() => {
      i++;
      setDisplayed(text.slice(0, i));
      if (i >= text.length) clearInterval(t);
    }, 18);
    return () => clearInterval(t);
  }, [active, text]);
  return displayed;
}

/* ── Upload Zone ── */
function UploadZone({ label, hint, optional, onFile, file }) {
  const [drag, setDrag] = useState(false);
  return (
    <div>
      <div className={`upload-zone ${drag ? 'drag' : ''}`}
        onDragOver={e => { e.preventDefault(); setDrag(true); }}
        onDragLeave={() => setDrag(false)}
        onDrop={e => { e.preventDefault(); setDrag(false); const f = e.dataTransfer.files[0]; if(f) onFile(f); }}
      >
        <input type="file" accept="image/*" onChange={e => e.target.files[0] && onFile(e.target.files[0])} />
        <div className="upload-icon"><IcUpload /></div>
        <div className="upload-title">{label}{optional && <span style={{color:'var(--text-muted)',fontWeight:400}}> (Optional)</span>}</div>
        <div className="upload-hint">{hint}</div>
        {file && <div className="upload-file"><IcFile /> {file.name}</div>}
      </div>
      {file && file.type && file.type.startsWith('image/') && (
        <div className="upload-preview" style={{marginTop:8}}>
          <img src={URL.createObjectURL(file)} alt="preview" />
        </div>
      )}
    </div>
  );
}

/* ── Analysis Steps ── */
const STEPS = [
  { id:'img',  label:'Image preprocessing',    sub:'Normalising intra-oral image',         icon: <IcEye /> },
  { id:'hist', label:'Histopathology analysis', sub:'Segmentation & feature extraction',    icon: <IcFile /> },
  { id:'clin', label:'Clinical correlation',    sub:'Age, gender, tobacco risk weighting',  icon: <IcData /> },
  { id:'gen',  label:'Genomic integration',     sub:'Gene expression cross-referencing',    icon: <IcDna /> },
  { id:'inf',  label:'AI inference',            sub:'Ensemble model prediction',            icon: <IcActivity /> },
];

function AnalysisSteps({ step }) {
  return (
    <div className="running-state">
      {STEPS.map((s, i) => {
        const status = i < step ? 'complete' : i === step ? 'active' : 'pending';
        return (
          <div className="analysis-step" key={s.id} style={{animationDelay: i * 0.08 + 's'}}>
            <div className={`step-icon ${status}`}>{s.icon}</div>
            <div>
              <div className="step-name">{s.label}</div>
              <div className="step-sub">{s.sub}</div>
            </div>
            {status === 'active'    && <div className="step-spinner" />}
            {status === 'complete'  && <div style={{marginLeft:'auto',color:'var(--success)'}}><IcCheck /></div>}
          </div>
        );
      })}
    </div>
  );
}

/* ── Result View ── */
function ResultView({ risk }) {
  const riskMap = {
    low:    { label:'Low Risk',    color:'var(--success)', bar:'var(--success)', pct:18 },
    medium: { label:'Medium Risk', color:'var(--warn)',    bar:'var(--warn)',    pct:55 },
    high:   { label:'High Risk',   color:'var(--error)',   bar:'var(--error)',   pct:82 },
  };
  const r = riskMap[risk] || riskMap.low;
  const findings = risk === 'low'
    ? ['Mucosa appears within normal limits','No evidence of dysplastic change','Tobacco-associated risk remains elevated — monitor annually']
    : risk === 'medium'
    ? ['Mild epithelial irregularity noted in left buccal mucosa','Moderate tobacco-related mucosal change','Genomic marker GENE_1 elevated — further biopsy recommended']
    : ['Significant dysplastic features detected','High-grade lesion probability in right lateral tongue','Urgent referral to oral surgery indicated'];

  return (
    <div className="result-section">
      <div>
        <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'1.2px',color:'var(--text-muted)',marginBottom:6}}>Prediction Outcome</div>
        <div className={`result-headline ${risk}`}>{r.label}</div>
        <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>Confidence interval: 91–96%</div>
      </div>

      <div className="metric-grid">
        <div className="metric-card">
          <div className="metric-label">Risk Score</div>
          <div className="metric-val" style={{color: r.color}}>{r.pct}%</div>
          <div className="bar-track"><div className="bar-fill" style={{width: r.pct+'%', background: r.color}} /></div>
        </div>
        <div className="metric-card">
          <div className="metric-label">Model Confidence</div>
          <div className="metric-val" style={{color:'var(--teal)'}}>94.2%</div>
          <div className="bar-track"><div className="bar-fill" style={{width:'94%', background:'var(--teal)'}} /></div>
        </div>
        <div className="metric-card">
          <div className="metric-label">Lesion Area</div>
          <div className="metric-val" style={{color:'var(--text-primary)'}}>{risk==='low'?'—':risk==='medium'?'2.3cm²':'4.7cm²'}</div>
          <div className="metric-sub">{risk==='low'?'No lesion detected':'Estimated surface area'}</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">Processing Time</div>
          <div className="metric-val" style={{color:'var(--text-primary)'}}>341ms</div>
          <div className="metric-sub">Inference + pipeline</div>
        </div>
      </div>

      <div>
        <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'1.2px',color:'var(--text-muted)',marginBottom:8}}>Key Findings</div>
        <div className="finding-list">
          {findings.map((f,i) => (
            <div className="finding-item" key={i}>
              <div className="finding-dot" style={{background: i===2&&risk!=='low' ? 'var(--error)' : r.color}} />
              {f}
            </div>
          ))}
        </div>
      </div>

      <div className="recommendation">
        <strong>Recommendation: </strong>
        {risk==='low' && 'Routine follow-up in 12 months. Encourage smoking cessation. No immediate intervention required.'}
        {risk==='medium' && 'Schedule biopsy within 4 weeks. Refer to oral medicine specialist. Initiate smoking cessation programme.'}
        {risk==='high' && 'Urgent referral to oral & maxillofacial surgery within 2 weeks. Multi-disciplinary team review recommended.'}
      </div>
    </div>
  );
}

/* ── App ── */
function App() {
  const [activeNav, setActiveNav] = useState('hub');
  const [oralImg,   setOralImg]   = useState(null);
  const [histImg,   setHistImg]   = useState(null);
  const [clinReport, setClinReport] = useState(null);
  const [age,       setAge]       = useState('');
  const [gender,    setGender]    = useState('');
  const [tobacco,   setTobacco]   = useState('');
  const [geneReport, setGeneReport] = useState(null);
  const [status,    setStatus]    = useState('idle');   // idle | running | done
  const [step,      setStep]      = useState(0);
  const [error,     setError]     = useState('');
  const [risk,      setRisk]      = useState('low');

  const sampleGene = '{"gene_1": 0.32, "gene_2": 0.24, "gene_3": 1.05}';
  const typedGene  = useTyping(sampleGene, status !== 'idle');

  async function runAnalysis() {
    if (!oralImg && !age) { setError('Please upload an intra-oral image or enter patient age.'); return; }
    setError(''); setStatus('running'); setStep(0);
    for (let i = 0; i < STEPS.length; i++) {
      setStep(i);
      await new Promise(r => setTimeout(r, 600 + Math.random()*400));
    }
    setStep(STEPS.length);
    // demo: pick risk based on tobacco
    const r = tobacco === 'Heavy smoker' ? 'high' : tobacco === 'Occasional' ? 'medium' : 'low';
    setRisk(r);
    setStatus('done');
  }

  const badgeEl = status === 'idle' ? <span className="results-badge badge-waiting">Awaiting input</span>
                : status === 'running' ? <span className="results-badge badge-running">Analysing…</span>
                : <span className="results-badge badge-done">Complete</span>;

  return (
    <div className="app">
      {/* Sidebar */}
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-icon">OS</div>
          <div>
            <div className="logo-name">OralScan AI</div>
            <div className="logo-sub">Diagnostic</div>
          </div>
        </div>
        <div className="sidebar-nav">
          <div className="nav-label">Navigation</div>
          {[
            { id:'hub',     label:'Diagnosis Hub',    icon:<IcHub /> },
          ].map(n => (
            <div key={n.id} className={`nav-item ${activeNav===n.id?'active':''}`} onClick={()=>setActiveNav(n.id)}>
              {n.icon}{n.label}
            </div>
          ))}
        </div>
        <div className="sidebar-footer">
          <div className="nav-item" style={{color:'var(--error)',opacity:0.8}}>
            <IcLogout />Logout
          </div>
        </div>
      </div>

      {/* Main */}
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">Clinical Decision Support</div>
          <div className="topbar-sub">Submit patient data for multi-modal AI analysis</div>
        </div>

        <div className="content">
          {/* Form */}
          <div className="form-col">
            <div className="card">
              <div className="card-header"><IcData />Patient Data Input</div>
              <div className="card-body">
                <UploadZone label="Upload Intra-Oral Image" hint="JPG, PNG up to 10 MB" file={oralImg} onFile={setOralImg} />
                <UploadZone label="Upload Histopathology" hint="JPG, PNG up to 10 MB" optional file={histImg} onFile={setHistImg} />


                <UploadZone label="Upload Clinical Report" hint="PDF, JPG, PNG up to 10 MB" file={clinReport} onFile={setClinReport} />

                <UploadZone label="Upload Gene Report" hint="PDF, JPG, PNG up to 10 MB" file={geneReport} onFile={setGeneReport} />

                {error && (
                  <div className="error-banner"><IcAlert />{error}</div>
                )}

                <button className={`run-btn ${status==='running'?'loading':''}`}
                  disabled={status==='running'}
                  onClick={runAnalysis}>
                  {status==='running' ? <>Analysing patient data…</> : <><IcPlay />Run AI Analysis</>}
                </button>
              </div>
            </div>
          </div>

          {/* Results */}
          <div className="results-col">
            <div className="results-header">
              <div className="results-title">Analysis Results</div>
              {badgeEl}
            </div>
            <div className="results-body">
              {status === 'idle' && (
                <div className="waiting-state">
                  <div className="pulse-ring">
                    <IcActivity />
                  </div>
                  <div className="waiting-title">Awaiting patient data</div>
                  <div className="waiting-sub">Fill in the patient form and run AI analysis to see diagnostic results here.</div>
                </div>
              )}
              {status === 'running' && <AnalysisSteps step={step} />}
              {status === 'done' && <ResultView risk={risk} />}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
